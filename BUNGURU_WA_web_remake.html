<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>ぶんぐるWA web remake</title>
<style>
  html,body{margin:0;padding:0;background:#06090f;color:#9fb6c9;font-family:"Courier New",monospace;
    -webkit-user-select:none;user-select:none;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
  #page{display:flex;flex-direction:column;align-items:center;gap:10px;padding:12px 8px 28px;}
  h1{font-size:15px;letter-spacing:2px;color:#59c2ff;margin:2px 0 0;font-weight:normal;}
  #langbar{display:flex;gap:6px;}
  .lb{background:#0d1826;border:1px solid #23405c;border-radius:4px;color:#7fa8c9;font-size:11px;
      font-family:inherit;padding:3px 10px;cursor:pointer;}
  .lb.on{background:#17436b;border-color:#3f81b8;color:#e8f4ff;}
  #game{position:relative;line-height:0;}
  #cv{display:block;image-rendering:pixelated;image-rendering:crisp-edges;background:#000;
      box-shadow:0 0 0 1px #1c2a3a,0 0 28px #0a2038;}
  #textCv{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
  #help{font-size:12px;line-height:1.75;max-width:520px;background:#0a121d;border:1px solid #16283c;
        border-radius:6px;padding:10px 16px;}
  #help b{color:#cfe6f5;}
  #help .k{display:inline-block;background:#152435;border:1px solid #2a4258;border-radius:3px;
           padding:0 6px;margin:0 2px;color:#e8f4ff;font-size:11px;}
  #credit{font-size:10px;color:#4a6076;}
  #touch{display:none;position:fixed;inset:auto 0 0 0;height:130px;pointer-events:none;z-index:10;touch-action:none;}
  .tb{position:absolute;bottom:18px;width:74px;height:74px;border-radius:50%;background:rgba(90,150,210,.16);
      border:2px solid rgba(120,180,240,.35);color:#cfe6ff;font-size:26px;line-height:70px;text-align:center;
      pointer-events:auto;touch-action:none;}
  .tb:active{background:rgba(120,190,255,.35);}
  #stick{position:absolute;left:18px;bottom:8px;width:112px;height:112px;border-radius:50%;pointer-events:auto;
      touch-action:none;background:rgba(90,150,210,.12);border:2px solid rgba(120,180,240,.35);}
  #stick::before,#stick::after{position:absolute;color:rgba(207,230,255,.55);font-size:14px;line-height:1;}
  #stick::before{content:'▲\A▼';white-space:pre;left:50px;top:9px;line-height:80px;}
  #stick::after{content:'◀             ▶';left:9px;top:49px;white-space:pre;}
  #stickKnob{position:absolute;left:32px;top:32px;width:48px;height:48px;border-radius:50%;
      background:rgba(120,190,255,.38);border:2px solid rgba(180,220,255,.65);box-sizing:border-box;
      box-shadow:0 2px 8px rgba(0,0,0,.35);will-change:transform;}
  #stick.active{background:rgba(120,190,255,.2);}
  #stick.horizontal-only::before{display:none;}
  #tJ{right:16px;width:92px;height:92px;line-height:88px;bottom:12px;font-size:18px;}
  #tE{display:none;position:fixed;top:10px;right:10px;z-index:10;background:rgba(210,90,90,.18);
      border:2px solid rgba(240,140,140,.4);border-radius:8px;color:#ffd8d8;font-size:13px;
      font-family:inherit;padding:8px 14px;touch-action:none;}
  #tE:active{background:rgba(255,120,120,.4);}
  @media (pointer:coarse){ #touch{display:block;} #tE{display:block;} #page{padding-bottom:150px;} }
  body.touch #touch{display:block;} body.touch #tE{display:block;} body.touch #page{padding-bottom:150px;}
</style>
</head>
<body>
<div id="page">
  <h1 id="ttl">Bgw 往上跳！</h1>
  <div id="langbar">
    <button class="lb" data-lang="zh">繁體中文</button>
    <button class="lb" data-lang="ja">日本語</button>
    <button class="lb" data-lang="en">English</button>
  </div>
  <div id="game">
    <canvas id="cv" width="320" height="240"></canvas>
    <canvas id="textCv" width="1280" height="960" aria-hidden="true"></canvas>
  </div>
  <div id="help"></div>
  <div id="credit"></div>
</div>
<div id="touch">
  <div id="stick" role="button" aria-label="方向搖桿"><div id="stickKnob"></div></div>
  <div class="tb" id="tJ">跳躍</div>
</div>

function decodeRankDat(bytes) {

  const dv = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength), out = [];

  }

}

  const bytes = new Uint8Array(120), dv = new DataView(bytes.buffer);

    dv.setInt32(o, e.s | 0, true);

    for (let j = 0; j < 3; j++) bytes[o + 4 + j] = name.charCodeAt(j) & 0x7f;

/* ================= physics ================= */

    }

    const edge = P.x - HIT_NEG;
    for (let y = top; y <= bot + TILE - 1; y += TILE) {
      const yy = Math.min(y, bot);

    for (let x = lft; x <= rgt + TILE - 1; x += TILE) {
      const xx = Math.min(x, rgt);
      if (solidAtPx(xx, feet)) {
        P.y = Math.floor(feet / TILE) * TILE - HIT_NEG;
        P.vy = 0; P.grounded = true;

function collectItems() {

function applyStandingEffects() {
  if (!P.grounded) return;

  if (!contacts.length) { P.grounded = false; return; }

  // Recovery is one original power unit per colliding floor tile per frame.
  P.pow = Math.min(PH.powMax, P.pow + contacts.length);

  // The shared counter advances once per solid-contact frame, including brown
  // tiles. It is not reset when the player leaves; only a crack step resets it.

  // tile's own threshold; the first one that qualifies consumes the counter.

  for (const contact of contacts) {

  }
  if (!gt) return;
  const i = gt.r * MAPW + gt.c;

  crumbleTick = 0;
  if ((v & 3) < 3) {
    tiles[i] = v + 1;
    sfx('break');
  } else {
    tiles[i] = 0;
    sfx('break');
  }

function updateTime() {
  if (++timeTick <= 120) return true;
  timeTick = 0;
  if (--timeLeft > 0) return true;
  timeLeft = 0;
  music.stop(); music.play('miss', false);
  setState('miss'); P.timeUp = true;
  return false;
}

function updateGame() {
  // The original accepts a jump only on the new-press edge. POWER, not a hard
  // jump counter, determines whether another ground or air jump is available.
  P.vx = 0;
  if (key.l) P.vx = -PH.move;
  if (key.r) P.vx = PH.move;

  // The EXE tests the current screen coordinate before movement. At exactly
  // x=64/192 the player therefore crosses the boundary once (to 62/194), then
  // the camera follows by the player's actual displacement on later frames.
  const screenX = P.x - camX;
  const followX = (P.vx < 0 && screenX < 64) || (P.vx > 0 && screenX > 192);
  const oldX = P.x;
  moveX(P.vx);
  if (followX) camX = Math.max(0, Math.min(WORLDW - PLAYW, camX + P.x - oldX));
  if (P.grounded && groundContacts().length === 0) P.grounded = false;
  if (collectItems()) return;
  applyStandingEffects();
  if (P.grounded && groundContacts().length === 0) P.grounded = false;

  // 0x452CA5 adds 4 fixed-point units once for every non-solid horizontal
  // scan column. A centred 24px hitbox spans one column; most positions span
  // two. This is the original "jump from the centre to fly higher" mechanic.
  if (!P.grounded) P.vy = Math.min(P.vy + PH.grav * horizontalScanCount(), PH.maxFall);
  if (jumpEdge && P.pow > 0) doJump();
  const screenY = P.y - camY;
  const followY = P.vy < 0 && screenY < 64;
  const oldY = P.y;
  moveY(P.vy);
  // The tower only scrolls upward. As on x, the strict dead-zone test uses the
  // pre-move coordinate, so the player first overshoots y=64 by one frame.
  if (followY) camY = Math.max(0, camY + P.y - oldY);

  // The EXE compares counter > 120, so one TIME unit is 121 update calls.
  if (!updateTime()) return;

  // Original miss test is the player's screen-space centre passing y=256.
  if (P.y - camY > 256) {
    music.stop(); music.play('miss', false);
    setState('miss');
    return;
  }

  // Player updater type 1: the frame written to the renderer is base+offset.
  // Moving changes base to 1 and cycles offsets 0..15 every three ticks, so
  // the visible frames are 1..16. Idle changes base to 0 and toggles 0/1 every
  // nine ticks. The EXE does not mirror the bitmap.
  if (P.vx !== 0) {
    if (++P.animTick > 2) {
      P.animTick = 0;
      P.animBase = 1;
      P.anim = (P.anim + (P.vx < 0 ? 1 : -1) + 16) & 15;
    }
  } else if (++P.animTick > 8) {
    P.animTick = 0;
    P.animBase = 0;
    P.anim = (P.anim + 1) & 1;
  }
}

/* ================= particles ================= */
function updateFx() {
  // Generic object lifetime is decremented after its updater, so a new type 3
  // starts at age -1 here and is rendered for ages 0..59 exactly.
  for (const p of popups) p.t++;
  popups = popups.filter(p => p.t < 60);
  // Type 4: two frames, five ticks per frame.
  for (const s of sparks) { s.t++; s.f = Math.floor(s.t / 5); }
  sparks = sparks.filter(s => s.t < 10);
  // Type 2: fixed-point gravity 4/32, terminal speed 192/32. The generic EXE
  // culler keeps a 4-sprite-size margin around the 320x240 screen.
  for (const d of debris) { d.t++; d.vy = Math.min(d.vy + PH.grav, PH.maxFall); d.y += d.vy; }

    const x = d.x - camX, y = d.y - camY;
    return x >= -128 && x <= 448 && y >= -128 && y <= 368;

  newRankIdx = -1;
  // Strict comparison and stable insertion match 0x45720C. The third int32 is
  // reserved/preserved by the EXE rather than displayed or rewritten.
  const pos = rank.findIndex(e => score > e.s);
  if (pos >= 0) {
    const reservedLevel = rank[pos].l || 1;
    rank.splice(pos, 0, { s: score, n: '   ', l: reservedLevel });
    rank.length = 10;
    newRankIdx = pos;
    setState('entry');
    music.stop(); music.play('rank', true);
  } else {
    music.stop(); titleMusicOn = false; menuOn = true; setState('title');
  }
}

// Literal table at 0x457478 (30 characters).
const ENTRY_CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ.!? ';

function update() {
  frame++; stateT++;
  switch (state) {
    case 'title': {
      if (!titleMusicOn && AC) { music.play('init', true); titleMusicOn = true; }
      if (confirmEdge || jumpEdge) {
        if (menuSel === 0) { sfx('pi'); titleMusicOn = false; startGame(); break; }
        else if (menuSel === 1) { sfx('pi'); optSel = 0; setState('option'); break; }
        else if (menuSel === 2) { sfx('pi'); titleMusicOn = false; music.stop(); setState('exit'); break; }
      }
      if (upEdge) { menuSel = (menuSel + 2) % 3; sfx('pi'); }
      if (dnEdge) { menuSel = (menuSel + 1) % 3; sfx('pi'); }
      break;
    }
    case 'option': {
      // rows: 0 GAME LEVEL, 1 RANKING, 2 EXIT
      if (upEdge) { optSel = (optSel + 2) % 3; sfx('pi'); }
      if (dnEdge) { optSel = (optSel + 1) % 3; sfx('pi'); }
      if (optSel === 0 && (lEdge || rEdge)) {
        const next = Math.max(1, Math.min(3, level + (rEdge ? 1 : -1)));
        if (next !== level) { level = next; sfx('pi'); }
      }
      if (confirmEdge || jumpEdge) {
        if (optSel === 1) { sfx('pi'); music.stop(); music.play('rank', true); newRankIdx = -1; setState('ranking'); }
        else if (optSel === 2) { sfx('pi'); menuOn = true; setState('title'); }
      }
      if (escEdge) { sfx('pi'); menuOn = true; setState('title'); }
      break;
    }
    case 'exit': {
      // web can't quit; ESC or confirm returns to the title
      if (escEdge || confirmEdge || jumpEdge) { menuOn = true; setState('title'); }
      break;
    }
    case 'levelstart': {
      // States 2 and 3 share the same player/object update path in GmMain; the
      // LEVEL/START text is an overlay, not a frozen pre-game screen.
      updateGame();
      updateFx();
      if (state !== 'levelstart') break;
      if (escEdge) { music.stop(); titleMusicOn = false; menuOn = true; setState('title'); break; }
      if (stateT > 120) { music.play('main', true); setState('game'); }
      break;
    }
    case 'game': {
      updateGame();
      updateFx();
      if (escEdge) { music.stop(); titleMusicOn = false; menuOn = true; setState('title'); }
      break;
    }
    case 'clear': {
      updateFx();
      // State 9 shows the normal playfield until midi\clear finishes. Only then
      // does state 10 start the rank music and reveal the bonus tally.
      if (clearPhase === 0 && stateT > 1 && !music.song) {
        music.play('rank', true); clearPhase = 1; stateT = 0;
      } else if (clearPhase === 1 && stateT > 120) { clearPhase = 2; stateT = 0; }
      else if (clearPhase === 2) {
        if (clearRemaining > 0) {
          score += 100; clearRemaining -= 100; sfx('pi');
        } else { clearPhase = 3; stateT = 0; }
      } else if (clearPhase === 3 && stateT > 1200) finishToRank();
      break;
    }
    case 'miss': {
      if (P.timeUp) {
        if (!P.grounded) P.vy = Math.min(P.vy + PH.grav * horizontalScanCount(), PH.maxFall);
        moveY(P.vy);
        applyStandingEffects();
      } else {
        P.vy = Math.min(P.vy + PH.grav * horizontalScanCount(), PH.maxFall); P.y += P.vy;
      }
      updateFx();
      if (stateT > 1 && !music.song) { setState('gameover'); music.play('gameover', false); }
      break;
    }
    case 'gameover': {
      if (stateT > 1 && !music.song) finishToRank();
      break;
    }
    case 'entry': {
      if (upEdge) { entryChar = (entryChar + 1) % ENTRY_CHARS.length; sfx('pi'); }
      if (dnEdge) { entryChar = (entryChar + ENTRY_CHARS.length - 1) % ENTRY_CHARS.length; sfx('pi'); }
      if (lEdge && entryPos > 0) {
        entryName[entryPos] = 29; entryPos--; entryName[entryPos] = 29; sfx('pi');
      }
      if (confirmEdge || jumpEdge) {
        entryName[entryPos] = entryChar;
        if (entryPos < 2) { entryPos++; sfx('pi'); }
        else {
          rank[newRankIdx].n = entryName.map(i => ENTRY_CHARS[i]).join('');
          saveRank();
          sfx('pi');
          setState('ranking');
        }
      }
      break;
    }
    case 'ranking': {
      if (confirmEdge || jumpEdge || escEdge || stateT > 600) {
        music.stop(); titleMusicOn = false; menuOn = true; setState('title');
      }
      break;
    }
  }
  jumpEdge = confirmEdge = escEdge = upEdge = dnEdge = lEdge = rEdge = false;
}

function drawRankingScreen() {
  ctx.drawImage(IMG.bg002, 0, 0);
  drawText(ctx, '- RANKING -', 40, 16, 2);
  drawText(ctx, 'RANK', 72, 40, 2);
  drawText(ctx, 'NAME', 128, 40, 2);
  drawText(ctx, 'SCORE', 208, 40, 2);
  for (let i = 0; i < 10; i++) {
    const e = rank[i];
    const suffix = i === 0 ? 'ST' : i === 1 ? 'ND' : i === 2 ? 'RD' : 'TH';
    drawText(ctx, String(i + 1).padStart(2, ' ') + suffix, 72, 56 + i * 16, 0);
    drawText(ctx, e.n.padEnd(3, ' '), 128, 56 + i * 16, 0);
    drawText(ctx, String(e.s).padStart(9, ' '), 176, 56 + i * 16, 0);
  }
}

function render() {
  ctx.clearRect(0, 0, 320, 240);
  const localizedUi = lang !== 'en' && (state === 'title' || state === 'option');
  if (localizedUi || textLayerActive) tctx.clearRect(0, 0, 320, 240);
  textLayerActive = localizedUi;
  switch (state) {
    case 'title': {
      ctx.drawImage(IMG.title, 0, 0);
      centerText(ctx, 'CREATED BY E.HASHIMOTO', 152, 0);
      const items = I18N[lang].game.menu;
      for (let i = 0; i < 3; i++) {
        centerUiText(ctx, items[i], 176 + i * 16, 2);
        if (menuSel === i) {
          drawText(ctx, '<', 112, 176 + i * 16, 1);
          drawText(ctx, '>', 200, 176 + i * 16, 1);
        }
      }
      break;
    }
    case 'option': {
      ctx.drawImage(IMG.bg002, 0, 0);
      centerUiText(ctx, I18N[lang].game.optionTitle, 32, 2);
      const ui = I18N[lang].game;
      const rows = [
        [ui.options[0], ui.levels[level - 1]],
        [ui.options[1], ''],
        [ui.options[2], ''],
      ];
      for (let i = 0; i < rows.length; i++) {
        const y = i < 1 ? 80 : 144 + (i - 1) * 16;
        drawUiText(ctx, rows[i][0], i < 1 ? 40 : 200, y, 2);
        if (rows[i][1]) drawUiText(ctx, rows[i][1], 200, y, 0);
        if (optSel === i) {
          drawText(ctx, '<', 192, y, 1);
          drawText(ctx, '>', 272, y, 1);
        }
      }
      break;
    }
    case 'exit': {
      ctx.fillStyle = '#000'; ctx.fillRect(0, 0, 320, 240);
      centerText(ctx, 'EXIT ESC KEY', 112, 2);
      break;
    }
    case 'levelstart': {
      drawWorld(); drawPlayer(); drawFx(); drawHud();
      drawText(ctx, 'LEVEL ' + LEVEL_NAMES[level - 1], 88, 112, 2);
      drawText(ctx, '- START! -', 88, 128, 2);
      break;
    }
    case 'game': {
      drawWorld(); drawPlayer(); drawFx(); drawHud();
      break;
    }
    case 'clear': {
      drawWorld(); drawPlayer(); drawFx(); drawHud();
      if (clearPhase > 0) {
        drawText(ctx, 'LEVEL ' + LEVEL_NAMES[level - 1], 88, 48, 2);
        drawText(ctx, '- CLEAR! -', 88, 64, 2);
        drawText(ctx, 'BUNGLUWA BONUS       PTS', 32, 104, 2);
        drawText(ctx, 'TIME     BONUS       PTS', 32, 120, 2);
        drawText(ctx, 'TOTAL    BONUS       PTS', 32, 152, 2);
        drawText(ctx, String(clearItemBonus).padStart(6, ' '), 144, 104, 0);
        drawText(ctx, String(clearTimeBonus).padStart(6, ' '), 144, 120, 0);
        drawText(ctx, String(clearRemaining).padStart(6, ' '), 144, 152, 0);
      }
      break;
    }
    case 'miss': {
      drawWorld(); drawPlayer(); drawFx(); drawHud();
      break;
    }
    case 'gameover': {
      drawWorld(); drawPlayer(); drawFx(); drawHud();
      drawText(ctx, 'GAME  OVER', 88, 112, 1);
      break;
    }
    case 'entry': {
      drawRankingScreen();
      for (let i = 0; i < entryPos; i++)
        drawText(ctx, ENTRY_CHARS[entryName[i]], 128 + i * 8, 56 + newRankIdx * 16, 0);
      drawText(ctx, ENTRY_CHARS[entryChar], 128 + entryPos * 8, 56 + newRankIdx * 16, 1);
      break;
    }
    case 'ranking': {
      drawRankingScreen();
      break;
    }
  }
}

/* ================= main loop ================= */
// Original order at 0x454C73: update/draw -> optional WAIT for vertical blank
// -> present -> optional SOFTWARE VSYNC busy-wait until 16 ms. There is never
// an accumulator or catch-up update. Browser rAF is the vertical-blank analogue.
let lastStep = 0;
function scheduleLoop() {
  if (waitVsync) requestAnimationFrame(loop);
  else if (softVsync && lastStep) {
    const delay = Math.max(0, 16 - (performance.now() - lastStep));
    setTimeout(() => loop(performance.now()), delay);
  } else setTimeout(() => loop(performance.now()), 0);
}
function loop(t) {
  if (softVsync && lastStep && t - lastStep < 16) {
    setTimeout(() => loop(performance.now()), 16 - (t - lastStep));
    return;
  }
  lastStep = t;
  update(); render(); scheduleLoop();
}
function boot() {
  fitCanvas();
  scheduleLoop();
}
function fitCanvas() {
  const coarse = matchMedia('(pointer: coarse)').matches || document.body.classList.contains('touch');
  const availW = Math.min(innerWidth - 16, 960);
  const availH = innerHeight - (coarse ? 200 : 60);
  let scale = Math.min(availW / 320, availH / 240);
  if (scale >= 2) scale = Math.floor(scale);       // crisp integer scaling on large screens
  scale = Math.max(scale, 0.8);
  cv.style.width = Math.round(320 * scale) + 'px';
  cv.style.height = Math.round(240 * scale) + 'px';
}
addEventListener('resize', fitCanvas);
window.__BGW_CORE__ = {
  mapTileForLevel, encodeRankDat, decodeRankDat,
  constants: { ...PH, crumbleFrames: { ...CRUMBLE_F }, camera: { left: 64, right: 192, top: 64 } },
  snapshot: () => ({ state, level, score, timeLeft, camX, camY, waitVsync, softVsync, lang, menuSel, optSel, entryPos, entryChar, stickDirection, player: P && { ...P } }),
};
</script>
